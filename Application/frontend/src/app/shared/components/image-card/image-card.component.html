<div class="image-card">
  <div class="image-container">
    <img [src]="showOverlay && overlayFilename ? getOverlayUrl() : getSourceUrl()" [alt]="imagePath"
      (error)="onImageError($event)" />
    @if (overlayFilename) {
    <button class="toggle-overlay" (click)="showOverlay = !showOverlay">
      {{ showOverlay ? 'Original' : 'Overlay' }}
    </button>
    }
    @if (domainLabel) {
    <div class="domain-badge-container">
      <app-status-badge [label]="domainLabel" [variant]="domainLabel === 'steel' ? 'steel' : 'sugar'" />
    </div>
    }
  </div>
  @if (caption) {
  <div class="image-caption">{{ caption }}</div>
  }
</div>
